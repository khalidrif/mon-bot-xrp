name: Wake Up Bot
on:
  schedule:
    # S'exécute toutes les 6 heures (suffisant pour Streamlit)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permet de le lancer manuellement pour tester

jobs:
  ping_streamlit:
    runs-on: ubuntu-latest
    steps:
      - name: Send Ping to Streamlit App
        run: |
          curl -I https://mon-bot-xrp-guujmuuqjpywxcj6fsxrmu.streamlit.app/
